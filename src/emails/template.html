<!doctype html>
<html>
  <head>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 62.5%;
      }

      body {
        font-size: 1.6rem;
        line-height: 1.5;
        font-weight: 400;
        font-family: "Onest", sans-serif;
      }

      .main-banner {
        background: url("../../public/images/hero-bg-gradient.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        padding-top: 2.4rem;
        padding-bottom: 3rem;
        position: relative;
        overflow: hidden;
      }

      .main-banner .banner-line-stroke {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      .main-banner .container {
        max-width: 40rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1.6rem;
      }

      .main-banner .container .banner-logo {
        display: inline-flex;
        position: relative;
      }

      .main-banner .container .banner-logo img {
        width: 11.8rem;
      }

      .main-banner .container .banner-heading {
        font-weight: 600;
        font-size: 4.8rem;
        line-height: 6rem;
        letter-spacing: -0.02em;
        color: white;
      }

      .main-banner .container .banner-heading span {
        background: linear-gradient(90deg, #ffd900 35.01%, #ee7621 67.72%);
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <!-- Main Banner -->
      <div class="main-banner">
        <div class="banner-line-stroke">
          <img
            src="../../public/images/email-template-banner-line.svg"
            alt="Line Stroke"
          />
        </div>

        <div class="container">
          <a href="/" class="banner-logo">
            <img src="../../public/images/logo.svg" alt="Brand Logo" />
          </a>

          <h1 class="banner-heading">
            Thank you for <span>being with us</span> 👋
          </h1>
        </div>
      </div>
    </main>
  </body>
</html>
